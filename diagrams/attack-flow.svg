<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 475" width="900" height="475">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d14"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxglow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4444" opacity="0.8"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff8c00" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00c853" opacity="0.8"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2196f3" opacity="0.8"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00bcd4" opacity="0.8"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="475" fill="url(#bg2)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="0" y1="350" x2="900" y2="350"/>
    <line x1="225" y1="0" x2="225" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/>
    <line x1="675" y1="0" x2="675" y2="420"/>
  </g>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e3f2fd" font-size="13" font-weight="700" letter-spacing="2">attack vectors → scanners → verdict</text>
  <text x="450" y="47" text-anchor="middle" fill="#546e7a" font-size="8.5" letter-spacing="1">how repo-forensics maps real-world attack techniques to findings</text>

  <!-- Column headers -->
  <text x="113" y="70" text-anchor="middle" fill="#546e7a" font-size="8" letter-spacing="1.5">ATTACK VECTOR</text>
  <text x="450" y="70" text-anchor="middle" fill="#546e7a" font-size="8" letter-spacing="1.5">SCANNER</text>
  <text x="787" y="70" text-anchor="middle" fill="#546e7a" font-size="8" letter-spacing="1.5">VERDICT</text>
  <line x1="30" y1="55" x2="870" y2="55" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="290" y1="55" x2="290" y2="445" stroke="#1e3a5f" stroke-width="0.8" stroke-dasharray="3,6"/>
  <line x1="610" y1="55" x2="610" y2="445" stroke="#1e3a5f" stroke-width="0.8" stroke-dasharray="3,6"/>

  <!-- ROW 1: Prompt injection / MCP tool poisoning -->
  <!-- Attack box -->
  <rect x="30" y="80" width="240" height="40" rx="5" fill="#1a0a0a" stroke="#ff4444" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="97" text-anchor="middle" fill="#ff8888" font-size="8.5" font-weight="600">prompt injection</text>
  <text x="150" y="111" text-anchor="middle" fill="#ff6666" font-size="7.5">MCP tool description poisoning</text>
  <!-- Arrow -->
  <line x1="270" y1="100" x2="350" y2="100" stroke="#ff4444" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowRed)"/>
  <!-- Scanner box -->
  <rect x="350" y="80" width="240" height="40" rx="5" fill="#0d0606" stroke="#ff4444" stroke-width="1" opacity="0.9"/>
  <text x="470" y="97" text-anchor="middle" fill="#ff6666" font-size="8.5" font-weight="600">skill_threats + mcp_security</text>
  <text x="470" y="111" text-anchor="middle" fill="#cc4444" font-size="7">TPA patterns, &lt;IMPORTANT&gt; tag, tool shadowing</text>
  <!-- Arrow -->
  <line x1="590" y1="100" x2="655" y2="100" stroke="#ff4444" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowRed)"/>
  <!-- Verdict -->
  <rect x="655" y="85" width="100" height="30" rx="4" fill="#2d0000" stroke="#ff4444" stroke-width="1.5"/>
  <text x="705" y="100" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="700">CRITICAL</text>
  <text x="705" y="112" text-anchor="middle" fill="#ff6666" font-size="7">exit 2</text>

  <!-- ROW 2: Supply chain / lifecycle hooks -->
  <rect x="30" y="135" width="240" height="40" rx="5" fill="#061507" stroke="#00c853" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="152" text-anchor="middle" fill="#69f0ae" font-size="8.5" font-weight="600">supply chain attack</text>
  <text x="150" y="166" text-anchor="middle" fill="#4caf50" font-size="7.5">install hooks + typosquatted packages</text>
  <line x1="270" y1="155" x2="350" y2="155" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowGreen)"/>
  <rect x="350" y="135" width="240" height="40" rx="5" fill="#010d02" stroke="#00c853" stroke-width="1" opacity="0.9"/>
  <text x="470" y="152" text-anchor="middle" fill="#4caf50" font-size="8.5" font-weight="600">lifecycle + dependencies</text>
  <text x="470" y="166" text-anchor="middle" fill="#2e7d32" font-size="7">npm/pip/go hooks, SANDWORM_MODE IOCs</text>
  <line x1="590" y1="155" x2="655" y2="155" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowGreen)"/>
  <rect x="655" y="140" width="100" height="30" rx="4" fill="#002200" stroke="#ff4444" stroke-width="1.5"/>
  <text x="705" y="155" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="700">CRITICAL</text>
  <text x="705" y="167" text-anchor="middle" fill="#ff6666" font-size="7">exit 2</text>

  <!-- ROW 3: Credential theft -->
  <rect x="30" y="190" width="240" height="40" rx="5" fill="#0e0316" stroke="#9c27b0" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="207" text-anchor="middle" fill="#ce93d8" font-size="8.5" font-weight="600">credential theft</text>
  <text x="150" y="221" text-anchor="middle" fill="#ab47bc" font-size="7.5">env vars → exfil, hardcoded secrets</text>
  <line x1="270" y1="210" x2="350" y2="210" stroke="#9c27b0" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowPurple)"/>
  <rect x="350" y="190" width="240" height="40" rx="5" fill="#060010" stroke="#9c27b0" stroke-width="1" opacity="0.9"/>
  <text x="470" y="207" text-anchor="middle" fill="#ab47bc" font-size="8.5" font-weight="600">secrets + dataflow</text>
  <text x="470" y="221" text-anchor="middle" fill="#6a1b9a" font-size="7">40+ secret patterns, source-to-sink taint</text>
  <line x1="590" y1="210" x2="655" y2="210" stroke="#9c27b0" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowPurple)"/>
  <rect x="655" y="195" width="100" height="30" rx="4" fill="#1a0028" stroke="#ff8c00" stroke-width="1.5"/>
  <text x="705" y="210" text-anchor="middle" fill="#ff8c00" font-size="9" font-weight="700">HIGH</text>
  <text x="705" y="222" text-anchor="middle" fill="#ffa726" font-size="7">exit 1</text>

  <!-- ROW 4: Obfuscated code execution -->
  <rect x="30" y="245" width="240" height="40" rx="5" fill="#150c00" stroke="#ff8c00" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="262" text-anchor="middle" fill="#ffb347" font-size="8.5" font-weight="600">obfuscated execution</text>
  <text x="150" y="276" text-anchor="middle" fill="#ff9800" font-size="7.5">base64 payloads, AST backdoors</text>
  <line x1="270" y1="265" x2="350" y2="265" stroke="#ff8c00" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowOrange)"/>
  <rect x="350" y="245" width="240" height="40" rx="5" fill="#0d0800" stroke="#ff8c00" stroke-width="1" opacity="0.9"/>
  <text x="470" y="262" text-anchor="middle" fill="#ff9800" font-size="8.5" font-weight="600">entropy + ast_analysis + sast</text>
  <text x="470" y="276" text-anchor="middle" fill="#e65100" font-size="7">Shannon entropy, __reduce__ chains, eval/exec</text>
  <line x1="590" y1="265" x2="655" y2="265" stroke="#ff8c00" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowOrange)"/>
  <rect x="655" y="250" width="100" height="30" rx="4" fill="#2d0000" stroke="#ff4444" stroke-width="1.5"/>
  <text x="705" y="265" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="700">CRITICAL</text>
  <text x="705" y="277" text-anchor="middle" fill="#ff6666" font-size="7">exit 2</text>

  <!-- ROW 5: Runtime behavior prediction -->
  <rect x="30" y="300" width="240" height="40" rx="5" fill="#031213" stroke="#00bcd4" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="317" text-anchor="middle" fill="#80deea" font-size="8.5" font-weight="600">runtime behavior</text>
  <text x="150" y="331" text-anchor="middle" fill="#00838f" font-size="7.5">time bombs, rug pulls, deferred payloads</text>
  <line x1="270" y1="320" x2="350" y2="320" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowTeal)"/>
  <rect x="350" y="300" width="240" height="40" rx="5" fill="#010a0b" stroke="#00bcd4" stroke-width="1" opacity="0.9"/>
  <text x="470" y="317" text-anchor="middle" fill="#00838f" font-size="8.5" font-weight="600">runtime_dynamism + manifest_drift</text>
  <text x="470" y="331" text-anchor="middle" fill="#006064" font-size="7">AST + regex, 5 detection categories</text>
  <line x1="590" y1="320" x2="655" y2="320" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowTeal)"/>
  <rect x="655" y="305" width="100" height="30" rx="4" fill="#2d0000" stroke="#ff4444" stroke-width="1.5"/>
  <text x="705" y="320" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="700">CRITICAL</text>
  <text x="705" y="332" text-anchor="middle" fill="#ff6666" font-size="7">exit 2</text>

  <!-- ROW 6: Infrastructure misconfiguration -->
  <rect x="30" y="355" width="240" height="40" rx="5" fill="#050d1a" stroke="#2196f3" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="372" text-anchor="middle" fill="#64b5f6" font-size="8.5" font-weight="600">infra misconfiguration</text>
  <text x="150" y="386" text-anchor="middle" fill="#1976d2" font-size="7.5">Docker, GHA injection, CVE configs</text>
  <line x1="270" y1="375" x2="350" y2="375" stroke="#2196f3" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowBlue)"/>
  <rect x="350" y="355" width="240" height="40" rx="5" fill="#020810" stroke="#2196f3" stroke-width="1" opacity="0.9"/>
  <text x="470" y="372" text-anchor="middle" fill="#1976d2" font-size="8.5" font-weight="600">infra</text>
  <text x="470" y="386" text-anchor="middle" fill="#0d47a1" font-size="7">CVE-2025-59536, CVE-2026-21852, K8s priv</text>
  <line x1="590" y1="375" x2="655" y2="375" stroke="#2196f3" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowBlue)"/>
  <rect x="655" y="360" width="100" height="30" rx="4" fill="#1a0028" stroke="#ff8c00" stroke-width="1.5"/>
  <text x="705" y="375" text-anchor="middle" fill="#ff8c00" font-size="9" font-weight="700">HIGH</text>
  <text x="705" y="387" text-anchor="middle" fill="#ffa726" font-size="7">exit 1</text>

  <!-- ROW 7: Repo integrity / binary masquerade -->
  <rect x="30" y="410" width="240" height="40" rx="5" fill="#031213" stroke="#00bcd4" stroke-width="1.2" filter="url(#boxglow)"/>
  <text x="150" y="427" text-anchor="middle" fill="#80deea" font-size="8.5" font-weight="600">repo integrity attack</text>
  <text x="150" y="441" text-anchor="middle" fill="#00838f" font-size="7.5">timestamp spoof, binary masquerade</text>
  <line x1="270" y1="430" x2="350" y2="430" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowTeal)"/>
  <rect x="350" y="410" width="240" height="40" rx="5" fill="#010a0b" stroke="#00bcd4" stroke-width="1" opacity="0.9"/>
  <text x="470" y="427" text-anchor="middle" fill="#00838f" font-size="8.5" font-weight="600">git_forensics + binary</text>
  <text x="470" y="441" text-anchor="middle" fill="#006064" font-size="7">GPG, identity spoofing, ELF/PE/Mach-O detection</text>
  <line x1="590" y1="430" x2="655" y2="430" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrowTeal)"/>
  <rect x="655" y="415" width="100" height="30" rx="4" fill="#001a1a" stroke="#ff8c00" stroke-width="1.5"/>
  <text x="705" y="430" text-anchor="middle" fill="#ff8c00" font-size="9" font-weight="700">MEDIUM</text>
  <text x="705" y="442" text-anchor="middle" fill="#ffa726" font-size="7">exit 1</text>

  <!-- Right side: correlation engine note -->
  <rect x="765" y="80" width="110" height="370" rx="6" fill="#0a1520" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
  <text x="820" y="100" text-anchor="middle" fill="#546e7a" font-size="7" letter-spacing="1">CORRELATION</text>
  <text x="820" y="112" text-anchor="middle" fill="#546e7a" font-size="7" letter-spacing="1">ENGINE</text>
  <line x1="785" y1="118" x2="855" y2="118" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="820" y="133" text-anchor="middle" fill="#37474f" font-size="7">14 compound</text>
  <text x="820" y="145" text-anchor="middle" fill="#37474f" font-size="7">threat rules</text>
  <text x="820" y="163" text-anchor="middle" fill="#546e7a" font-size="7">env access</text>
  <text x="820" y="175" text-anchor="middle" fill="#546e7a" font-size="7">+ network =</text>
  <text x="820" y="187" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">exfiltration</text>
  <line x1="800" y1="197" x2="840" y2="197" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="212" text-anchor="middle" fill="#546e7a" font-size="7">base64</text>
  <text x="820" y="224" text-anchor="middle" fill="#546e7a" font-size="7">+ exec =</text>
  <text x="820" y="236" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">obfuscation</text>
  <line x1="800" y1="246" x2="840" y2="246" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="261" text-anchor="middle" fill="#546e7a" font-size="7">prompt inj</text>
  <text x="820" y="273" text-anchor="middle" fill="#546e7a" font-size="7">+ exec =</text>
  <text x="820" y="285" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">RCE chain</text>
  <line x1="800" y1="295" x2="840" y2="295" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="310" text-anchor="middle" fill="#546e7a" font-size="7">SQL inj</text>
  <text x="820" y="322" text-anchor="middle" fill="#546e7a" font-size="7">+ MCP =</text>
  <text x="820" y="334" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">stored PI</text>
  <line x1="800" y1="344" x2="840" y2="344" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="359" text-anchor="middle" fill="#546e7a" font-size="7">dyn import</text>
  <text x="820" y="371" text-anchor="middle" fill="#546e7a" font-size="7">+ network =</text>
  <text x="820" y="383" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">deferred load</text>
  <line x1="800" y1="393" x2="840" y2="393" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="408" text-anchor="middle" fill="#546e7a" font-size="7">time trigger</text>
  <text x="820" y="420" text-anchor="middle" fill="#546e7a" font-size="7">+ exec =</text>
  <text x="820" y="432" text-anchor="middle" fill="#ff4444" font-size="7" font-weight="600">time bomb</text>
  <line x1="800" y1="442" x2="840" y2="442" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="820" y="455" text-anchor="middle" fill="#37474f" font-size="6.5">+ 6 more rules</text>
  <text x="820" y="467" text-anchor="middle" fill="#37474f" font-size="6.5">correlating</text>
  <text x="820" y="479" text-anchor="middle" fill="#37474f" font-size="6.5">across all 18</text>
</svg>
