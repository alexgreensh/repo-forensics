name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/alexgreensh/repo-forensics/blob/main/CLA.md"
          branch: "main"
          allowlist: "alexgreensh,dependabot[bot],bot*"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/alexgreensh/repo-forensics/blob/main/CLA.md).

            This project uses dual licensing (PolyForm Noncommercial + Commercial). The CLA ensures we can continue offering both licenses.

            To sign, please post a comment with exactly:
            `I have read the CLA Document and I hereby sign the CLA`
