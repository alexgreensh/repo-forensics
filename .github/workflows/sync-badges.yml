name: Verify badge counts

# Keeps the README badges, prose counts, and diagram numbers in lockstep with
# the code. The job recomputes generated files and fails on drift; it never
# commits or pushes from CI. The version + stars + release-date badges are live
# shields.io endpoints and need no job.

on:
  push:
    branches: [main]
    paths:
      - "skills/repo-forensics/scripts/scan_*.py"
      - "skills/repo-forensics/tests/**"
      - ".claude-plugin/plugin.json"
      - "scripts/sync_badges.py"
      - ".github/requirements/pytest.txt"
      - ".github/workflows/sync-badges.yml"
  pull_request:
    branches: [main]
    paths:
      - "skills/repo-forensics/scripts/scan_*.py"
      - "skills/repo-forensics/tests/**"
      - ".claude-plugin/plugin.json"
      - "scripts/sync_badges.py"
      - ".github/requirements/pytest.txt"
      - ".github/workflows/sync-badges.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-badges
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install hash-locked test runner
        run: >-
          python -m pip install --disable-pip-version-check
          --require-hashes --only-binary=:all:
          -r .github/requirements/pytest.txt
      - name: Verify generated badge files are current
        run: python3 scripts/sync_badges.py --check
