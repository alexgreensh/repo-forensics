name: Verify Checksums

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify checksums.json is up to date
        run: |
          cd skill
          python3 scripts/verify_install.py --verify
