name: Verify Checksums

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify checksums.json is up to date
        run: |
          cd skill
          python3 scripts/verify_install.py --verify
