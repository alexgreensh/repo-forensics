name: Verify Checksums

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify checksums
        run: |
          cd skills/repo-forensics
          python3 scripts/verify_install.py --verify || {
            echo "::error::Checksums are stale. Run \`python verify_install.py --generate\` locally and commit the result."
            exit 1
          }
