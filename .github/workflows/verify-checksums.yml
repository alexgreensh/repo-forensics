name: Verify Checksums

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify checksums
        id: verify
        run: |
          cd skill
          python3 scripts/verify_install.py --verify
        continue-on-error: true

      - name: Regenerate checksums if stale
        if: steps.verify.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd skill
          python3 scripts/verify_install.py --generate

      - name: Commit updated checksums
        if: steps.verify.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skill/checksums.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: auto-regenerate checksums after merge"
          git push

      - name: Fail PR if checksums are stale
        if: steps.verify.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          echo "::error::Checksums are stale. Run: python3 scripts/verify_install.py --generate"
          exit 1
